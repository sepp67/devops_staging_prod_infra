---
project_enabled: true
project_name: webcam-stream
project_key: webcam-stream
project_env: staging
project_vm: vm-webcam-staging

project_type: web
project_domain: webcam.staging.local
project_expose_via_proxy: true
project_tls_mode: internal

project_image: ghcr.io/sepp67/ansible-role-webcam-stream:0.1.0
project_container_name: webcam-stream
project_container_port: 80
project_host_bind_ip: 0.0.0.0
project_host_bind_port: 18010
project_restart_policy: unless-stopped

project_healthcheck_path: /
project_healthcheck_enabled: false

project_env_vars:
  RTSP_URL: "rtsp://{{ vault_webcam_rtsp_user }}:{{ vault_webcam_rtsp_password }}@{{ webcam_camera_ip }}:554/h264Preview_01_main"
  WEBCAM_LATITUDE: "{{ webcam_latitude }}"
  WEBCAM_LONGITUDE: "{{ webcam_longitude }}"
  WEBCAM_TIMEZONE: "{{ webcam_timezone }}"
  SNAPSHOT_RETENTION_DAYS: "31"
  SNAPSHOT_WIDTH: "1920"
  SNAPSHOT_HEIGHT: "1080"
  SNAPSHOT_QUALITY: "2"
  SNAPSHOT_WINDOW_MINUTES: "10"
  HLS_TIME: "2"
  HLS_LIST_SIZE: "6"

project_volumes:
  - /opt/webcam-stream/gallery:/var/www/html/gallery

project_monitoring_enabled: true
project_node_exporter_enabled: true
project_promtail_enabled: true

project_labels:
  environment: staging
  project: webcam-stream
  role: app