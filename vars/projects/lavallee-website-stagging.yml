project_enabled: true

project_name: mon-site-lavallee
project_key: mon-site-lavallee
project_env: staging
project_vm: vm-lavallee-website-staging

project_type: web
project_domain: lavallee.staging.local
project_expose_via_proxy: true
project_tls_mode: internal

project_image: ghcr.io/sepp67/ansible-role-website-lavallee:latest
project_container_name: mon-site-lavallee
project_container_port: 80
project_host_bind_ip: 0.0.0.0
project_host_bind_port: 18001          # ← change si tu veux un autre port
project_restart_policy: unless-stopped
project_healthcheck_path: /

project_env_vars: {}
project_volumes: []

project_healthcheck_enabled: false

project_monitoring_enabled: true
project_node_exporter_enabled: true
project_promtail_enabled: true

project_labels:
  environment: staging
  project: mon-site-lavallee
  role: app