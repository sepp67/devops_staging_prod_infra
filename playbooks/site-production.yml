---
- name: Build production project registry
  hosts: localhost
  gather_facts: false
  roles:
    - role: project_registry
      vars:
        project_registry_target_env: production

- name: Bootstrap and deploy production application VMs
  hosts: app_hosts
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assign current production project to this host
      ansible.builtin.include_role:
        name: project_registry
      vars:
        project_registry_assign_current_host: true

    - name: Build normalized project context
      ansible.builtin.include_role:
        name: project_context

  roles:
    - role: base_linux
    - role: docker_host
    - role: monitoring_agent
      when:
        - project_monitoring_enabled | bool
        - >
          (project_node_exporter_enabled | bool)
          or
          (project_promtail_enabled | bool)
    - role: app_image_deploy
    - role: healthcheck
      vars:
        healthcheck_public_enabled: false

- name: Publish production sites on reverse proxy
  hosts: proxies
  become: true
  gather_facts: true
  vars:
    registry_projects: "{{ hostvars['localhost']['registry_projects'] | default([]) }}"
  tasks:
    - name: Apply Caddy configuration for each production project
      ansible.builtin.include_role:
        name: caddy_proxy
      vars:
        project_enabled: "{{ item.project_enabled | default(true) }}"
        project_name: "{{ item.project_name }}"
        project_key: "{{ item.project_key | default(item.project_name) }}"
        project_env: "{{ item.project_env }}"
        project_vm: "{{ item.project_vm }}"
        project_domain: "{{ item.project_domain | default('') }}"
        project_expose_via_proxy: "{{ item.project_expose_via_proxy | default(false) }}"
        project_host_bind_port: "{{ item.project_host_bind_port }}"
        project_healthcheck_path: "{{ item.project_healthcheck_path | default('/health') }}"
      loop: "{{ registry_projects }}"
      loop_control:
        label: "{{ item.project_name }}"

- name: Ship production Caddy logs from reverse proxies to Loki
  hosts: proxies
  become: true
  gather_facts: true
  vars:
    monitoring_loki_host: "{{ groups['monitoring'][0] }}"
  roles:
    - role: monitoring_agent
      vars:
        monitoring_agent_manage_node_exporter: false
        monitoring_agent_manage_promtail: true
        promtail_enabled: true
        promtail_loki_url: "http://{{ hostvars[monitoring_loki_host].ansible_host }}:3100/loki/api/v1/push"
        promtail_scrape_configs:
          - job_name: caddy_access
            static_configs:
              - targets:
                  - localhost
                labels:
                  job: caddy
                  env: production
                  host: "{{ inventory_hostname }}"
                  __path__: /var/log/caddy/*.access.log
            relabel_configs:
              - source_labels: ['__path__']
                regex: '.*/([^/]+)\.access\.log'
                target_label: site
                replacement: '$1'



- name: Register production monitoring targets
  hosts: monitoring
  become: true
  gather_facts: true
  vars:
    registry_projects: "{{ hostvars['localhost']['registry_projects'] | default([]) }}"
  tasks:
    - name: Apply Prometheus node target for each production project
      ansible.builtin.include_role:
        name: prometheus_target
      vars:
        project_enabled: "{{ item.project_enabled | default(true) }}"
        project_name: "{{ item.project_name }}"
        project_key: "{{ item.project_key | default(item.project_name) }}"
        project_env: "{{ item.project_env }}"
        project_vm: "{{ item.project_vm }}"
        project_monitoring_enabled: "{{ item.project_monitoring_enabled | default(true) }}"
        project_node_exporter_enabled: "{{ item.project_node_exporter_enabled | default(true) }}"
        project_node_exporter_port: "{{ item.project_node_exporter_port | default(9100) }}"
      loop: "{{ registry_projects }}"
      loop_control:
        label: "{{ item.project_name }}"

    - name: Apply blackbox target for each production project
      ansible.builtin.include_role:
        name: blackbox_target
      vars:
        project_enabled: "{{ item.project_enabled | default(true) }}"
        project_name: "{{ item.project_name }}"
        project_key: "{{ item.project_key | default(item.project_name) }}"
        project_env: "{{ item.project_env }}"
        project_vm: "{{ item.project_vm }}"
        project_domain: "{{ item.project_domain | default('') }}"
        project_monitoring_enabled: "{{ item.project_monitoring_enabled | default(true) }}"
        project_expose_via_proxy: "{{ item.project_expose_via_proxy | default(false) }}"
        project_healthcheck_enabled: "{{ item.project_healthcheck_enabled | default(true) }}"
        project_healthcheck_path: "{{ item.project_healthcheck_path | default('/health') }}"
      loop: "{{ registry_projects }}"
      loop_control:
        label: "{{ item.project_name }}"

- name: Verify public production endpoints
  hosts: app_hosts
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assign current production project to this host
      ansible.builtin.include_role:
        name: project_registry
      vars:
        project_registry_assign_current_host: true

    - name: Build normalized project context
      ansible.builtin.include_role:
        name: project_context

  roles:
    - role: healthcheck
      vars:
        healthcheck_public_enabled: "{{ project_expose_via_proxy | bool }}"