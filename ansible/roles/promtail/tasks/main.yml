---
- name: Create promtail directory
  ansible.builtin.file:
    path: "{{ promtail_install_dir }}"
    state: directory
    mode: "0755"

- name: Deploy promtail compose
  ansible.builtin.copy:
    dest: "{{ promtail_install_dir }}/compose.yml"
    mode: "0644"
    content: |
      services:
        promtail:
          image: grafana/promtail:2.9.4
          container_name: {{ promtail_container_name }}
          restart: unless-stopped
          command: -config.file=/etc/promtail/promtail.yml
          volumes:
            - ./promtail.yml:/etc/promtail/promtail.yml:ro
            - /var/log:/var/log:ro
            - /tmp:/tmp
  notify: Restart promtail stack

- name: Deploy promtail config
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: "{{ promtail_install_dir }}/promtail.yml"
    mode: "0644"
  notify: Restart promtail stack

- name: Start promtail
  ansible.builtin.command:
    chdir: "{{ promtail_install_dir }}"
    cmd: docker compose up -d
  changed_when: true
