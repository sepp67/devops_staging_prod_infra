---
- name: Validate Caddy configuration
  listen: Validate and reload caddy
  ansible.builtin.command:
    chdir: "{{ proxy_dir }}"
    cmd: docker exec caddy caddy validate --config /etc/caddy/Caddyfile
  changed_when: false

- name: Reload Caddy configuration
  listen: Validate and reload caddy
  ansible.builtin.command:
    chdir: "{{ proxy_dir }}"
    cmd: docker exec caddy caddy reload --config /etc/caddy/Caddyfile
  changed_when: true
