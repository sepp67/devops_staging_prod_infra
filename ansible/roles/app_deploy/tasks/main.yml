---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - app_name | length > 0
      - app_install_dir | length > 0
      - app_image | length > 0
    fail_msg: "app_name, app_install_dir and app_image must be defined"

- name: Create application directories
  ansible.builtin.import_tasks: directories.yml

- name: Render application environment file
  ansible.builtin.import_tasks: env.yml

- name: Render and start compose stack
  ansible.builtin.import_tasks: compose.yml

- name: Validate application health
  ansible.builtin.import_tasks: validate.yml
  when: app_healthcheck_enabled | bool
