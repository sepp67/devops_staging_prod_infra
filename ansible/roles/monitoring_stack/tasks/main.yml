- name: Ensure monitoring directory exists
  file:
    path: "{{ monitoring_install_dir | default('/opt/monitoring') }}"
    state: directory
    mode: "0755"

- name: Deploy docker compose
  ansible.builtin.copy:
    src: compose.yml
    dest: "{{ monitoring_install_dir | default('/opt/monitoring') }}/compose.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_install_dir | default('/opt/monitoring') }}/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana env file
  ansible.builtin.template:
    src: grafana.env.j2
    dest: "{{ monitoring_install_dir | default('/opt/monitoring') }}/grafana.env"
    mode: "0600"
  notify: Restart monitoring stack

- name: Deploy Grafana provisioning (datasources + dashboards)
  ansible.builtin.copy:
    src: grafana/
    dest: "{{ monitoring_install_dir | default('/opt/monitoring') }}/grafana/"
    mode: "0755"
  notify: Restart monitoring stack

- name: Stop stack to remove deleted services
  command:
    cmd: docker compose -f compose.yml down --remove-orphans
    chdir: "{{ monitoring_install_dir | default('/opt/monitoring') }}"

- name: Start monitoring stack (docker compose)
  command: docker compose -f compose.yml up -d
  args:
    chdir: "{{ monitoring_install_dir | default('/opt/monitoring') }}"
  register: compose_up
  changed_when: "'Recreating' in compose_up.stdout or 'Creating' in compose_up.stdout or 'Starting' in compose_up.stdout"
