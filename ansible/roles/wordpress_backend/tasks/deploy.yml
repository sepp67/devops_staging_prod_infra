---
- name: Compute proxy IP
  ansible.builtin.set_fact:
    proxy_ip: "{{ hostvars[groups['proxy'][0]].ansible_host }}"

- name: Select site for this host
  ansible.builtin.set_fact:
    site: "{{ (sites | selectattr('name', 'equalto', site_name) | list | first) }}"
    secret: "{{ sites_secrets[site_name] }}"
    bind_ip: "{{ ansible_host }}"

- name: Define site_dir
  ansible.builtin.set_fact:
    site_dir: "{{ wp_dir }}/{{ site.name }}"

- name: Create backend directory
  ansible.builtin.file:
    path: "{{ site_dir }}"
    state: directory
    mode: "0755"

- name: Create php config directory
  ansible.builtin.file:
    path: "{{ site_dir }}/php"
    state: directory
    mode: "0755"

- name: Remove custom.ini if directory exists
  ansible.builtin.file:
    path: "{{ site_dir }}/php/custom.ini"
    state: absent

- name: Copy custom php ini
  ansible.builtin.copy:
    src: "../../../deploy/php/custom.ini"
    dest: "{{ site_dir }}/php/custom.ini"
    mode: "0644"

- name: Deploy backend compose.yml
  ansible.builtin.template:
    src: compose.wp.yml.j2
    dest: "{{ site_dir }}/compose.yml"
    mode: "0644"

- name: Allow backend port only from proxy
  ansible.builtin.ufw:
    rule: allow
    port: "{{ site.backend_port }}"
    proto: tcp
    from_ip: "{{ proxy_ip }}"
  when: firewall_enabled | default(false)

- name: Deny HTTP on backend
  ansible.builtin.ufw:
    rule: deny
    port: "80"
    proto: tcp
  when: firewall_enabled | default(false)

- name: Deny HTTPS on backend
  ansible.builtin.ufw:
    rule: deny
    port: "443"
    proto: tcp
  when: firewall_enabled | default(false)

- name: Start or update backend stack
  ansible.builtin.command:
    chdir: "{{ site_dir }}"
    cmd: docker compose up -d
  changed_when: true
