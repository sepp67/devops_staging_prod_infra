---
- name: Assert required variables are defined
  ansible.builtin.assert:
    that:
      - vars[item] is defined
      - vars[item] is not none
      - (vars[item] | string | length) > 0
    fail_msg: "Variable '{{ item }}' must be defined for role facturier_demo"
  loop: "{{ facturier_required_vars }}"

- name: Check Docker is available
  ansible.builtin.command: docker version
  register: facturier_docker_check
  changed_when: false

- name: Check docker compose plugin is available
  ansible.builtin.command: docker compose version
  register: facturier_compose_check
  changed_when: false
