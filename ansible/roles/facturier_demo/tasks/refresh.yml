---
- name: Refresh vitrine homepage
  ansible.builtin.template:
    src: index_vitrine.html.j2
    dest: "{{ facturier_install_dir }}/web/vitrine/index.html"
    mode: "0644"

- name: Refresh frontend app files
  ansible.builtin.copy:
    src: app/
    dest: "{{ facturier_install_dir }}/web/app/"
    mode: preserve

- name: Refresh generation scripts
  ansible.builtin.copy:
    src: scripts/
    dest: "{{ facturier_scripts_dir }}/"
    mode: preserve

- name: Refresh API main.py
  ansible.builtin.template:
    src: main.py.j2
    dest: "{{ facturier_install_dir }}/api/app/main.py"
    mode: "0644"

- name: Refresh nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ facturier_install_dir }}/web/nginx.conf"
    mode: "0644"

- name: Refresh docker compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ facturier_install_dir }}/compose.yml"
    mode: "0644"

- name: Recreate facturier stack
  ansible.builtin.command:
    cmd: docker compose -f compose.yml up -d --force-recreate
    chdir: "{{ facturier_install_dir }}"
  register: facturier_refresh
  changed_when: >
    'Recreating' in facturier_refresh.stdout or
    'Creating' in facturier_refresh.stdout or
    'Starting' in facturier_refresh.stdout

- name: Validate facturier web after refresh
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ facturier_web_port }}/"
    status_code: 200
  register: facturier_web_refresh_check
  retries: 15
  delay: 2
  until: facturier_web_refresh_check.status == 200
  changed_when: false

- name: Validate facturier api after refresh
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ facturier_api_port }}/api/health"
    status_code: 200
  register: facturier_api_refresh_check
  retries: 15
  delay: 2
  until: facturier_api_refresh_check.status == 200
  changed_when: false
  when: facturier_enable_api | bool
