---
facturier_app_name: facturier-demo
facturier_app_env: staging

facturier_install_dir: /opt/facturier-demo
facturier_compose_project_name: facturier_demo

facturier_web_port: 8080
facturier_api_port: 8000

facturier_web_container_name: facturier-web
facturier_api_container_name: facturier-api

facturier_user: root
facturier_group: root

facturier_domain_vitrine: facturier.staging.local
facturier_domain_app: app.facturier.staging.local
facturier_domain_api: api.facturier.staging.local

facturier_enable_api: true
facturier_enable_generation: false

facturier_data_dir: "{{ facturier_install_dir }}/data"
facturier_input_dir: "{{ facturier_data_dir }}/input"
facturier_output_dir: "{{ facturier_data_dir }}/output"
facturier_tmp_dir: "{{ facturier_data_dir }}/tmp"

facturier_logs_dir: "{{ facturier_install_dir }}/logs"
facturier_scripts_dir: "{{ facturier_install_dir }}/scripts"

facturier_web_dir: "{{ facturier_install_dir }}/web"
facturier_vitrine_dir: "{{ facturier_web_dir }}/vitrine"
facturier_frontend_dir: "{{ facturier_web_dir }}/app"

facturier_api_dir: "{{ facturier_install_dir }}/api"
facturier_api_app_dir: "{{ facturier_api_dir }}/app"

facturier_restart_policy: unless-stopped

facturier_api_workers: 1
facturier_api_log_level: info

facturier_python_image: python:3.12-slim
facturier_web_image: nginx:stable-alpine

facturier_healthcheck_web_url: "http://127.0.0.1:{{ facturier_web_port }}/"
facturier_healthcheck_api_url: "http://127.0.0.1:{{ facturier_api_port }}/api/health"

facturier_required_vars:
  - facturier_app_env
  - facturier_install_dir
  - facturier_web_port
  - facturier_api_port
