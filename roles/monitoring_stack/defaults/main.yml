---
monitoring_stack_manage_docker: false

monitoring_stack_root_dir: /opt/monitoring
monitoring_stack_compose_path: "{{ monitoring_stack_root_dir }}/compose.yml"

monitoring_stack_timezone: Europe/Paris

monitoring_stack_prometheus_image: prom/prometheus:v2.54.1
monitoring_stack_grafana_image: grafana/grafana:11.2.0
monitoring_stack_blackbox_image: prom/blackbox-exporter:v0.25.0
monitoring_stack_pve_exporter_image: prompve/prometheus-pve-exporter:3.5.5

monitoring_stack_prometheus_port: 9090
monitoring_stack_grafana_port: 3000
monitoring_stack_blackbox_port: 9115
monitoring_stack_pve_exporter_port: 9221

monitoring_stack_prometheus_retention_time: 30d
monitoring_stack_prometheus_retention_size: 10GB
monitoring_stack_prometheus_scrape_interval: 30s
monitoring_stack_prometheus_evaluation_interval: 30s

monitoring_stack_prometheus_config_dir: "{{ monitoring_stack_root_dir }}/prometheus"
monitoring_stack_prometheus_config_path: "{{ monitoring_stack_prometheus_config_dir }}/prometheus.yml"
monitoring_stack_prometheus_rules_path: "{{ monitoring_stack_prometheus_config_dir }}/alert_rules.yml"
monitoring_stack_prometheus_data_dir: "{{ monitoring_stack_root_dir }}/prometheus/data"

monitoring_stack_blackbox_config_dir: "{{ monitoring_stack_root_dir }}/blackbox"
monitoring_stack_blackbox_config_path: "{{ monitoring_stack_blackbox_config_dir }}/blackbox.yml"

monitoring_stack_grafana_dir: "{{ monitoring_stack_root_dir }}/grafana"
monitoring_stack_grafana_data_dir: "{{ monitoring_stack_grafana_dir }}/data"

monitoring_stack_pve_config_dir: "{{ monitoring_stack_root_dir }}/pve"
monitoring_stack_pve_config_path: "{{ monitoring_stack_pve_config_dir }}/pve.yml"

monitoring_stack_prometheus_file_sd_root: /etc/prometheus/file_sd
monitoring_stack_prometheus_node_targets_dir: "{{ monitoring_stack_prometheus_file_sd_root }}/node_targets"
monitoring_stack_prometheus_blackbox_targets_dir: "{{ monitoring_stack_prometheus_file_sd_root }}/blackbox_targets"

monitoring_stack_blackbox_module: http_2xx

monitoring_stack_blackbox_valid_status_codes:
  - 200
  - 301
  - 302

monitoring_stack_pve_target: "https://127.0.0.1:8006"
monitoring_stack_pve_user: "monitoring@pve"
monitoring_stack_pve_token_name: "prometheus"
monitoring_stack_pve_token_value: ""
monitoring_stack_pve_verify_ssl: false

monitoring_stack_grafana_admin_user: admin
monitoring_stack_grafana_admin_password: changeme

monitoring_stack_default_alerts_enabled: true
monitoring_stack_http_slow_threshold_seconds: 1
monitoring_stack_low_disk_threshold_ratio: 0.10

monitoring_stack_loki_image: grafana/loki:3.1.1
monitoring_stack_loki_port: 3100

monitoring_stack_loki_enabled: true
monitoring_stack_loki_config_dir: "{{ monitoring_stack_root_dir }}/loki"
monitoring_stack_loki_config_path: "{{ monitoring_stack_loki_config_dir }}/loki.yml"
monitoring_stack_loki_data_dir: "{{ monitoring_stack_root_dir }}/loki/data"

monitoring_stack_grafana_provisioning_dir: "{{ monitoring_stack_grafana_dir }}/provisioning"
monitoring_stack_grafana_datasources_dir: "{{ monitoring_stack_grafana_provisioning_dir }}/datasources"
monitoring_stack_grafana_dashboards_provisioning_dir: "{{ monitoring_stack_grafana_provisioning_dir }}/dashboards"
monitoring_stack_grafana_dashboards_dir: "{{ monitoring_stack_grafana_dir }}/dashboards"

monitoring_stack_grafana_prometheus_datasource_name: Prometheus
monitoring_stack_grafana_loki_datasource_name: Loki
monitoring_stack_grafana_default_datasource: Prometheus

monitoring_stack_grafana_uid: "472"
monitoring_stack_grafana_gid: "472"

