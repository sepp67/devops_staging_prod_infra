---
- name: Ensure monitoring directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_observability_root_dir }}"
    - "{{ monitoring_observability_prometheus_dir }}"
    - "{{ monitoring_observability_prometheus_rules_dir }}"
    - "{{ monitoring_observability_prometheus_data_dir }}"
    - "{{ monitoring_observability_loki_dir }}"
    - "{{ monitoring_observability_loki_data_dir }}"
    - "{{ monitoring_observability_blackbox_dir }}"
    - "{{ monitoring_observability_grafana_dir }}"
    - "{{ monitoring_observability_grafana_data_dir }}"
    - "{{ monitoring_observability_grafana_dashboards_dir }}"
    - "{{ monitoring_observability_grafana_provisioning_dir }}"
    - "{{ monitoring_observability_grafana_datasources_dir }}"
    - "{{ monitoring_observability_grafana_dashboards_provisioning_dir }}"
    - "{{ monitoring_observability_prometheus_file_sd_root }}"
    - "{{ monitoring_observability_prometheus_node_targets_dir }}"
    - "{{ monitoring_observability_prometheus_blackbox_targets_dir }}"

- name: Ensure Grafana data dir ownership
  ansible.builtin.file:
    path: "{{ monitoring_observability_grafana_data_dir }}"
    state: directory
    owner: "472"
    group: "472"
    mode: "0755"

- name: Ensure Loki data dir ownership
  ansible.builtin.file:
    path: "{{ monitoring_observability_loki_data_dir }}"
    state: directory
    owner: "{{ monitoring_observability_loki_uid }}"
    group: "{{ monitoring_observability_loki_gid }}"
    mode: "0755"

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_observability_prometheus_config_path }}"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Loki configuration
  ansible.builtin.template:
    src: loki.yml.j2
    dest: "{{ monitoring_observability_loki_config_path }}"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Blackbox Exporter configuration
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ monitoring_observability_blackbox_config_path }}"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana datasources provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ monitoring_observability_grafana_datasources_dir }}/datasources.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy Grafana dashboards provider provisioning
  ansible.builtin.template:
    src: grafana-dashboards-provider.yml.j2
    dest: "{{ monitoring_observability_grafana_dashboards_provisioning_dir }}/dashboards.yml"
    mode: "0644"
  notify: Restart monitoring stack

- name: Deploy monitoring docker compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ monitoring_observability_compose_path }}"
    mode: "0644"
  notify: Restart monitoring stack

- name: Ensure monitoring stack is started
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_observability_root_dir }}"
    files:
      - "{{ monitoring_observability_compose_path }}"
    state: present

