---
- name: Install Docker prerequisite packages
  ansible.builtin.apt:
    name: "{{ docker_host_prereq_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker keyring directory exists
  ansible.builtin.file:
    path: "{{ docker_host_repo_keyring_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Docker ASCII GPG key
  ansible.builtin.get_url:
    url: "{{ docker_host_repo_url }}/gpg"
    dest: "{{ docker_host_repo_keyring_ascii_file }}"
    mode: "0644"

- name: Convert Docker ASCII GPG key to binary keyring
  ansible.builtin.command:
    cmd: >-
      gpg --dearmor
      --yes
      --output {{ docker_host_repo_keyring_file }}
      {{ docker_host_repo_keyring_ascii_file }}
  changed_when: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_host_repo_arch }} signed-by={{ docker_host_repo_keyring_file }}]
      {{ docker_host_repo_url }}
      {{ docker_host_repo_release }} stable
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_host_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  ansible.builtin.systemd:
    name: docker
    enabled: "{{ docker_host_service_enabled }}"
    state: "{{ docker_host_service_state }}"

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_host_users }}"
  when:
    - docker_host_users is defined
    - docker_host_users | length > 0

- name: Ensure application root directory exists
  ansible.builtin.file:
    path: /opt/apps
    state: directory
    owner: root
    group: root
    mode: "0755"
