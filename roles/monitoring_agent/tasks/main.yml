---
- name: Install base packages for monitoring agent
  ansible.builtin.package:
    name: "{{ monitoring_agent_required_packages }}"
    state: present

- name: Ensure monitoring system group exists
  ansible.builtin.group:
    name: "{{ monitoring_agent_system_group }}"
    system: true
    state: present

- name: Ensure monitoring system user exists
  ansible.builtin.user:
    name: "{{ monitoring_agent_system_user }}"
    group: "{{ monitoring_agent_system_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    home: /nonexistent
    state: present

- name: Include node_exporter tasks
  ansible.builtin.include_tasks: node_exporter.yml
  when:
    - monitoring_agent_manage_node_exporter | bool
    - node_exporter_enabled | bool

- name: Include promtail tasks
  ansible.builtin.include_tasks: promtail.yml
  when:
    - monitoring_agent_manage_promtail | bool
    - promtail_enabled | bool